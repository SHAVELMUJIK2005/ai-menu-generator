name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker/docker-compose.prod.yml,docker/nginx/"
          target: "/opt/menu-app/"
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DOMAIN: ${{ secrets.DOMAIN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_REPOSITORY,IMAGE_TAG,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,REDIS_PASSWORD,JWT_SECRET,TG_BOT_TOKEN,OPENROUTER_API_KEY,DOMAIN,FRONTEND_URL,GH_TOKEN,GH_ACTOR
          script: |
            set -e
            cd /opt/menu-app

            # Пишем .env без лишних отступов
            # GITHUB_REPOSITORY в нижний регистр — GHCR требует lowercase
            GITHUB_REPOSITORY_LOWER=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
            printf "GITHUB_REPOSITORY=%s\n" "$GITHUB_REPOSITORY_LOWER" > .env
            printf "IMAGE_TAG=%s\n" "$IMAGE_TAG" >> .env
            printf "POSTGRES_DB=%s\n" "$POSTGRES_DB" >> .env
            printf "POSTGRES_USER=%s\n" "$POSTGRES_USER" >> .env
            printf "POSTGRES_PASSWORD=%s\n" "$POSTGRES_PASSWORD" >> .env
            printf "REDIS_PASSWORD=%s\n" "$REDIS_PASSWORD" >> .env
            printf "JWT_SECRET=%s\n" "$JWT_SECRET" >> .env
            printf "TG_BOT_TOKEN=%s\n" "$TG_BOT_TOKEN" >> .env
            printf "OPENROUTER_API_KEY=%s\n" "$OPENROUTER_API_KEY" >> .env
            printf "DOMAIN=%s\n" "$DOMAIN" >> .env
            printf "WEBHOOK_DOMAIN=%s\n" "$DOMAIN" >> .env
            printf "FRONTEND_URL=%s\n" "$FRONTEND_URL" >> .env
            printf "NODE_ENV=production\n" >> .env

            # Логинимся в GHCR
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Удаляем override файл если есть (он был для ручного деплоя)
            rm -f docker-compose.override.yml docker-compose.nginx-temp.yml

            # Rolling update backend
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d --no-deps backend

            # Ждём пока backend поднимется (проверяем health endpoint)
            echo "Waiting for backend to become healthy..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T backend \
                   wget -qO- http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "Backend is healthy after ${i}s"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "Backend did not become healthy in 30s, checking logs..."
                docker compose -f docker-compose.prod.yml logs --tail=50 backend
                exit 1
              fi
              sleep 1
            done

            # Миграции
            docker compose -f docker-compose.prod.yml exec -T backend \
              npx prisma migrate deploy

            # Перезапускаем nginx только если SSL-сертификат уже есть
            CERT_MOUNTPOINT=$(docker volume inspect menu-app_certbot_conf --format '{{.Mountpoint}}' 2>/dev/null || echo "")
            if [ -n "$CERT_MOUNTPOINT" ] && [ -f "$CERT_MOUNTPOINT/live/greenmenuai.ru/fullchain.pem" ]; then
              echo "SSL cert found — restarting nginx with HTTPS config"
              docker compose -f docker-compose.prod.yml up -d --no-deps nginx
            else
              echo "No SSL cert yet — leaving nginx as is (HTTP-only mode)"
            fi

            # Чистим старые образы
            docker image prune -f

            echo "Deploy completed successfully"
