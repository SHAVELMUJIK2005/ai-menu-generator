version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: menu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: menu_app
      POSTGRES_USER: menu_user
      POSTGRES_PASSWORD: menu_pass_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: menu_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  postgres_data:
